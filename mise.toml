min_version = "2024.11.0"

[tools]
go = "1.22"
gum = "0.17"
swift = { version = "6.3", os = ["macos"] }
xcodegen = { version = "2.44.1", os = ["macos"] }

[env]
_.path = ["./bin"]

[tasks.setup]
description = "Install mise tools and platform dependencies"
run = "./scripts/setup.sh"

[tasks.dev]
description = "Build and run airvoice server (default dev workflow)"
depends = ["build"]
run = "./bin/airvoice serve"

[tasks.menu]
description = "Interactive development menu (gum)"
run = "./scripts/dev.sh"

[tasks."ios:device"]
description = "Build and install on a physical iOS device (macOS + Xcode)"
run = "./scripts/ios-device.sh"

[tasks.build]
description = "Build Go CLI to bin/airvoice"
run = "go build -o bin/airvoice ./cli"

[tasks.doctor]
description = "Check macOS paste permissions"
depends = ["build"]
run = "./bin/airvoice doctor"

[tasks.test]
description = "Run Go unit tests"
run = "go test ./cli/..."

[tasks.serve]
description = "Alias for dev — build and run airvoice server"
depends = ["build"]
run = "./bin/airvoice serve"

[tasks."android:build"]
description = "Build Android debug APK"
run = "bash -c 'source ./scripts/java-env.sh && cd android && ./gradlew assembleDebug --no-daemon'"

[tasks."android:release"]
description = "Build Android release APK"
run = "bash -c 'source ./scripts/java-env.sh && cd android && ./gradlew assembleRelease --no-daemon'"

[tasks."android:test"]
description = "Run Android unit tests"
run = "bash -c 'source ./scripts/java-env.sh && cd android && ./gradlew testDebugUnitTest --no-daemon'"

[tasks."android:clean"]
description = "Clean Android build outputs"
run = "bash -c 'source ./scripts/java-env.sh && cd android && ./gradlew clean --no-daemon'"

[tasks."android:install"]
description = "Build and install debug APK on connected device"
run = "bash -c 'source ./scripts/java-env.sh && cd android && ./gradlew installDebug --no-daemon'"
