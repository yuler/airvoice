name: CLI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          mkdir -p dist

          # macOS ARM64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION#v}" -o dist/airvoice-darwin-arm64 ./cli

          # macOS AMD64 (Intel)
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION#v}" -o dist/airvoice-darwin-amd64 ./cli

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.version=${VERSION#v}" -o dist/airvoice-linux-arm64 ./cli

          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${VERSION#v}" -o dist/airvoice-linux-amd64 ./cli

      - name: Generate checksums
        run: |
          cd dist
          sha256sum airvoice-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Airvoice CLI ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            dist/airvoice-darwin-arm64
            dist/airvoice-darwin-amd64
            dist/airvoice-linux-arm64
            dist/airvoice-linux-amd64
            dist/checksums.txt

      - name: Update Homebrew formula
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_NUM="${VERSION#v}"

          # Calculate SHA256 for macOS ARM64 (primary)
          SHA256_ARM64=$(sha256sum dist/airvoice-darwin-arm64 | cut -d' ' -f1)
          SHA256_AMD64=$(sha256sum dist/airvoice-darwin-amd64 | cut -d' ' -f1)
          SHA256_LINUX_ARM64=$(sha256sum dist/airvoice-linux-arm64 | cut -d' ' -f1)
          SHA256_LINUX_AMD64=$(sha256sum dist/airvoice-linux-amd64 | cut -d' ' -f1)

          # Clone tap repo
          git clone https://x-access-token:${TAP_REPO_TOKEN}@github.com/yuler/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          # Create formula
          mkdir -p Formula
          cat > Formula/airvoice.rb << EOF
          class Airvoice < Formula
            desc "Voice-to-text CLI for Airvoice"
            homepage "https://github.com/yuler/airvoice"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yuler/airvoice/releases/download/${VERSION}/airvoice-darwin-arm64"
                sha256 "${SHA256_ARM64}"
              else
                url "https://github.com/yuler/airvoice/releases/download/${VERSION}/airvoice-darwin-amd64"
                sha256 "${SHA256_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/yuler/airvoice/releases/download/${VERSION}/airvoice-linux-arm64"
                sha256 "${SHA256_LINUX_ARM64}"
              else
                url "https://github.com/yuler/airvoice/releases/download/${VERSION}/airvoice-linux-amd64"
                sha256 "${SHA256_LINUX_AMD64}"
              end
            end

            def install
              bin.install "airvoice"
            end

            test do
              assert_match "airvoice", shell_output("#{bin}/airvoice version")
            end
          end
          EOF

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/airvoice.rb
          git commit -m "Update airvoice to ${VERSION}"
          git push
