name: WWW CI

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - '.github/workflows/www-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'www/**'
      - '.github/workflows/www-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: www/package-lock.json

      - name: Install dependencies
        working-directory: www
        run: npm ci

      - name: Build
        working-directory: www
        run: npm run build
