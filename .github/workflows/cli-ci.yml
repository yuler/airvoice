name: CLI CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cli/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/cli-ci.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run CLI Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run CLI Tests
        run: go test -v ./cli/...
